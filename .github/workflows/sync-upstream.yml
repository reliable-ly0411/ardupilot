name: Sync upstream

on:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge upstream master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/ArduPilot/ardupilot.git
          git fetch upstream master
          git checkout master
          if git merge-base --is-ancestor upstream/master master; then
            echo "Already up to date"
            exit 0
          fi

          merge_status=0
          git merge --no-ff --no-commit upstream/master || merge_status=$?
          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            non_workflow_conflicts="$(printf '%s\n' "$conflicts" | grep -v '^.github/workflows/' || true)"
            if [ -n "$non_workflow_conflicts" ]; then
              echo "Merge has non-workflow conflicts:"
              printf '%s\n' "$non_workflow_conflicts"
              exit 1
            fi
          fi

          git restore --source=HEAD --staged --worktree -- .github/workflows
          if git diff --cached --quiet && git diff --quiet; then
            echo "Only upstream workflow changes; keeping fork workflow configuration"
            git merge --abort
            exit 0
          fi

          git commit -m "Sync upstream ArduPilot master"
          git push origin master
